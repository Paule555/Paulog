<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#10B981">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Paulog">
<link rel="manifest" href="paulog-manifest.json">
<link rel="apple-touch-icon" href="paulog-icon-192.png?v=1">
<link rel="icon" type="image/png" sizes="192x192" href="paulog-icon-192.png?v=1">
<link rel="icon" type="image/png" sizes="512x512" href="paulog-icon-512.png?v=1">
<title>Paulog</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;background:#0F172A;color:#E2E8F0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
button{font-family:inherit;cursor:pointer}
.app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:100px}
/* Header */
.hdr{padding:32px 20px 16px;text-align:center}
.hdr h1{font-size:32px;font-weight:800;letter-spacing:4px;color:#F8FAFC}
.hdr h1 span{color:#10B981}
.hdr p{font-size:13px;color:#64748B;margin-top:4px;letter-spacing:2px;text-transform:uppercase}
/* Stats */
.stats{display:flex;justify-content:center;align-items:center;gap:24px;padding:16px 20px;margin:0 20px 8px;background:#1E293B;border-radius:12px}
.stat{display:flex;flex-direction:column;align-items:center}
.stat-n{font-size:24px;font-weight:700;color:#F8FAFC}
.stat-l{font-size:11px;color:#64748B;text-transform:uppercase;letter-spacing:1px}
.stat-div{width:1px;height:32px;background:#334155}
/* Section */
.sec{padding:12px 20px}
.sec-t{font-size:13px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px}
/* Day buttons */
.day-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px;margin-bottom:10px;background:#1E293B;border:none;border-radius:10px;text-align:left;color:#E2E8F0}
.day-btn .name{font-size:16px;font-weight:700}
.day-btn .musc{font-size:12px;color:#94A3B8;margin-top:2px}
.day-btn .arr{font-size:22px;font-weight:700}
.day-btn.sug{background:rgba(16,185,129,0.07)}
/* Bottom buttons */
.bbtn{padding:8px 20px;display:flex;flex-direction:column;gap:8px}
.sec-btn{width:100%;padding:14px;background:transparent;border:1px solid #334155;border-radius:10px;color:#94A3B8;font-size:15px;font-weight:600}
/* Track header */
.t-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:#1E293B;position:sticky;top:0;z-index:10}
.back{background:none;border:none;color:#94A3B8;font-size:24px;padding:4px 8px}
.t-hdr h2{font-size:18px;font-weight:700;color:#F8FAFC}
.t-hdr .sub{font-size:11px;color:#64748B}
.t-hdr .din{margin-left:auto;background:#0F172A;border:1px solid #334155;border-radius:8px;color:#E2E8F0;padding:6px 10px;font-size:13px;font-family:inherit}
/* Exercise cards */
.e-list{padding:8px 12px}
.e-card{margin-bottom:8px;border-radius:10px;overflow:hidden;background:#1E293B}
.e-hdr{display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px;background:#1E293B;border:none;color:#E2E8F0;text-align:left}
.e-name{font-size:14px;font-weight:700}
.e-vol{font-size:11px;color:#94A3B8}
.e-vol .delta-up{color:#10B981;margin-left:4px}
.e-vol .delta-dn{color:#EF4444;margin-left:4px}
.e-icon{font-size:10px;color:#64748B}
.e-body{padding:0 14px 14px}
/* Prev session */
.prev{background:#0F172A;border-radius:8px;padding:8px 12px;margin-bottom:10px}
.prev-l{font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:1px}
.prev-s{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap}
.prev-s span{font-size:12px;color:#94A3B8;background:#1E293B;padding:2px 8px;border-radius:4px}
/* Sets grid */
.s-grid{display:flex;flex-direction:column;gap:6px}
.s-hdr{display:grid;grid-template-columns:36px 1fr 1fr;gap:8px;margin-bottom:2px}
.s-hdr span{font-size:10px;color:#475569;text-align:center}
.s-row{display:grid;grid-template-columns:36px 1fr 1fr;gap:8px;align-items:center}
.s-cell{display:flex;gap:4px;align-items:center}
.wp-trigger{width:32px;height:32px;border-radius:8px;background:#0F172A;border:1px solid #334155;color:#64748B;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wp-trigger:active{background:#334155;color:#F8FAFC}
.s-num{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#FFF;font-weight:700;font-size:14px}
.s-inp{width:100%;padding:10px 8px;background:#0F172A;border:1px solid #334155;border-radius:8px;color:#F8FAFC;font-size:16px;text-align:center;font-weight:600;outline:none;font-family:inherit}
.s-inp:focus{border-color:#3B82F6}
/* Save button */
.save-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 48px);max-width:440px;padding:16px;background:#3B82F6;border:none;border-radius:12px;color:#FFF;font-size:16px;font-weight:700;z-index:20;box-shadow:0 4px 24px rgba(59,130,246,0.4)}
/* Wheel Picker */
.wp-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.wp-box{width:100%;max-width:480px;background:#1E293B;border-radius:16px 16px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);animation:wp-slide .25s ease-out}
@keyframes wp-slide{from{transform:translateY(100%)}to{transform:translateY(0)}}
.wp-top{display:flex;justify-content:space-between;align-items:center;padding:14px 20px;border-bottom:1px solid #334155}
.wp-title{font-size:15px;font-weight:700;color:#F8FAFC}
.wp-done{background:none;border:none;color:#3B82F6;font-size:16px;font-weight:700;padding:4px 8px}
.wp-cols{display:flex;justify-content:center;gap:0;padding:8px 20px 16px;position:relative}
.wp-col{position:relative;width:120px;height:210px;overflow:hidden;-webkit-mask-image:linear-gradient(to bottom,transparent,black 30%,black 70%,transparent);mask-image:linear-gradient(to bottom,transparent,black 30%,black 70%,transparent)}
.wp-col-inner{position:absolute;left:0;right:0;transition:transform 0.15s ease-out}
.wp-col-inner.animating{transition:transform 0.4s cubic-bezier(0.22,1,0.36,1)}
.wp-item{height:42px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#475569;user-select:none;-webkit-user-select:none}
.wp-item.active{color:#F8FAFC;font-size:26px}
.wp-sel{position:absolute;top:50%;left:8px;right:8px;height:42px;transform:translateY(-50%);background:rgba(59,130,246,0.12);border-radius:10px;border:1px solid rgba(59,130,246,0.25);pointer-events:none}
.wp-unit{font-size:14px;color:#64748B;font-weight:600;display:flex;align-items:center;padding:0 4px}
/* History */
.h-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:#1E293B;position:sticky;top:0;z-index:10}
.h-hdr h2{font-size:18px;font-weight:700;color:#F8FAFC}
.h-cnt{margin-left:auto;font-size:12px;color:#64748B;background:#0F172A;padding:4px 10px;border-radius:12px}
.empty{text-align:center;padding:60px 20px}
.empty .ico{font-size:48px}
.empty .txt{font-size:16px;font-weight:600;color:#94A3B8;margin-top:12px}
.empty .sub{font-size:13px;color:#475569}
.mo-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 20px 6px;border-bottom:1px solid #1E293B}
.mo-hdr .name{font-size:14px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:1px}
.mo-hdr .cnt{font-size:11px;color:#475569}
.s-card{display:flex;margin:8px 12px;border-radius:10px;overflow:hidden;background:#1E293B}
.s-card .bar{width:4px;flex-shrink:0}
.s-card .cont{flex:1;padding:12px 14px}
.s-card .top{display:flex;justify-content:space-between;align-items:flex-start}
.s-card .day{font-size:14px;font-weight:700;color:#F8FAFC}
.s-card .date{font-size:12px;color:#64748B;margin-top:2px}
.s-card .sts{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.s-card .vol{font-size:13px;font-weight:700;color:#E2E8F0}
.s-card .exc{font-size:11px;color:#64748B}
.s-card .exs{margin-top:10px;padding-top:10px;border-top:1px solid #0F172A;display:flex;flex-direction:column;gap:4px}
.s-card .exr{display:flex;justify-content:space-between;align-items:center}
.s-card .exn{font-size:12px;color:#94A3B8}
.s-card .exd{font-size:11px;color:#64748B}
.s-card .acts{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #0F172A}
.act-edit{flex:1;padding:8px;background:#1E3A5F;border:none;border-radius:8px;color:#60A5FA;font-size:13px;font-weight:600}
.act-del{flex:1;padding:8px;background:#3B1C1C;border:none;border-radius:8px;color:#F87171;font-size:13px;font-weight:600}
.dc-bar{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #0F172A}
.dc-txt{font-size:13px;color:#F87171;font-weight:600;flex:1}
.dc-yes{padding:8px 14px;background:#DC2626;border:none;border-radius:8px;color:#FFF;font-size:12px;font-weight:700}
.dc-no{padding:8px 14px;background:#334155;border:none;border-radius:8px;color:#94A3B8;font-size:12px;font-weight:600}
/* Dashboard */
.d-hdr{display:flex;align-items:center;gap:12px;padding:16px 20px;background:#1E293B;position:sticky;top:0;z-index:10}
.d-hdr h2{font-size:18px;font-weight:700;color:#F8FAFC}
.c-sec{padding:16px 20px;border-bottom:1px solid #1E293B}
.c-sec h3{font-size:16px;font-weight:700;margin:0 0 2px}
.c-sec .csub{font-size:11px;color:#64748B;margin:0 0 12px}
.c-wrap{background:#1E293B;border-radius:10px;padding:12px 8px}
.c-legend{padding:6px 0;line-height:1.8;display:flex;flex-wrap:wrap}
.c-legend span{display:inline-flex;align-items:center;gap:4px;margin-right:10px;font-size:10px;color:#94A3B8}
.c-legend .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.no-data{font-size:13px;color:#475569;font-style:italic}
.d-filter{padding:12px 20px;display:flex;align-items:center;gap:10px}
.d-filter-l{font-size:12px;color:#64748B;white-space:nowrap}
.d-filter-opts{display:flex;gap:6px;flex-wrap:wrap}
.d-filter-btn{padding:6px 12px;background:#1E293B;border:1px solid #334155;border-radius:8px;color:#94A3B8;font-size:12px;font-weight:600}
.d-filter-btn.active{background:#10B981;border-color:#10B981;color:#FFF}
.pb-sec{padding:16px 20px}
.pb-sec h3{font-size:16px;font-weight:700;margin-bottom:12px;color:#F8FAFC}
.pb-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#1E293B;border-radius:8px;margin-bottom:6px}
.pb-left{display:flex;flex-direction:column;gap:2px}
.pb-row .ex{font-size:13px;color:#CBD5E1}
.pb-date{font-size:11px;color:#64748B}
.pb-row .kg{font-size:14px;font-weight:700;color:#F59E0B}
/* Backup */
.b-sec{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.b-card{background:#1E293B;border-radius:12px;padding:20px}
.b-card h3{font-size:15px;font-weight:700;color:#F8FAFC;margin-bottom:6px}
.b-card p{font-size:13px;color:#94A3B8;line-height:1.5;margin-bottom:12px}
.b-card .ld{font-size:12px;color:#64748B;margin-bottom:12px;font-style:italic}
.b-xbtn{width:100%;padding:12px;background:#3B82F6;border:none;border-radius:8px;color:#FFF;font-size:14px;font-weight:700}
.b-ibtn{display:block;width:100%;padding:12px;background:#1E3A5F;border:1px dashed #3B82F6;border-radius:8px;color:#60A5FA;font-size:14px;font-weight:600;text-align:center;cursor:pointer}
.b-cnf{background:#1E293B;border-radius:12px;padding:20px;border:1px solid #334155;display:flex;flex-direction:column;gap:8px}
.b-mrg{width:100%;padding:12px;background:#10B981;border:none;border-radius:8px;color:#FFF;font-size:14px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px}
.b-rpl{width:100%;padding:12px;background:#F59E0B;border:none;border-radius:8px;color:#0F172A;font-size:14px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px}
.b-bs{font-size:11px;font-weight:400;opacity:0.8}
.b-suc{padding:14px;background:#064E3B;border-radius:10px;color:#6EE7B7;font-size:14px;font-weight:600;text-align:center}
.b-err{padding:14px;background:#7F1D1D;border-radius:10px;color:#FCA5A5;font-size:14px;font-weight:600;text-align:center}
.b-inf{background:#1E293B;border-radius:12px;padding:16px;border:1px solid #334155}
.b-inf h3{font-size:13px;font-weight:700;color:#F8FAFC;margin-bottom:6px}
.b-inf p{font-size:13px;color:#94A3B8;line-height:1.5;margin:0}
/* Reminder */
.rem{margin:8px 20px 0;padding:14px 16px;background:#1E293B;border-radius:10px;border:1px solid rgba(245,158,11,0.2)}
.rem .rt{display:flex;align-items:center;gap:8px;font-size:13px;color:#F59E0B}
.rem .ra{display:flex;gap:8px;margin-top:10px}
.rem .rb{flex:1;padding:8px;background:#F59E0B;border:none;border-radius:8px;color:#0F172A;font-size:13px;font-weight:700}
.rem .rd{padding:8px 14px;background:transparent;border:1px solid #334155;border-radius:8px;color:#64748B;font-size:13px}
/* Settings */
.set-sec{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.set-card{background:#1E293B;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.set-card .sc-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.set-card .sc-info{flex:1;min-width:0}
.set-card .sc-name{font-size:15px;font-weight:700;color:#F8FAFC}
.set-card .sc-musc{font-size:12px;color:#94A3B8;margin-top:2px}
.set-card .sc-meta{font-size:11px;color:#64748B;margin-top:2px}
.set-card .sc-acts{display:flex;gap:6px;flex-shrink:0}
.sc-btn{width:36px;height:36px;border-radius:8px;border:none;display:flex;align-items:center;justify-content:center;font-size:16px}
.sc-btn-edit{background:#1E3A5F;color:#60A5FA}
.sc-btn-del{background:#3B1C1C;color:#F87171}
.sc-btn-up{background:#0F172A;color:#94A3B8}
.sc-btn-dn{background:#0F172A;color:#94A3B8}
.set-add-btn{width:100%;padding:14px;background:transparent;border:2px dashed #334155;border-radius:12px;color:#64748B;font-size:14px;font-weight:600}
.set-global{background:#1E293B;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:12px}
.set-global h3{font-size:14px;font-weight:700;color:#F8FAFC}
.sg-row{display:flex;align-items:center;justify-content:space-between}
.sg-row label{font-size:13px;color:#94A3B8}
.sg-row input,.sg-row select{background:#0F172A;border:1px solid #334155;border-radius:8px;color:#F8FAFC;padding:8px 12px;font-size:14px;font-weight:600;width:80px;text-align:center;font-family:inherit}
.set-reset{width:100%;padding:12px;background:#3B1C1C;border:1px solid #7F1D1D;border-radius:10px;color:#F87171;font-size:13px;font-weight:600;margin-top:8px}
/* Edit Day */
.ed-sec{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.ed-field{display:flex;flex-direction:column;gap:4px}
.ed-field label{font-size:12px;color:#64748B;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.ed-field input[type=text],.ed-field input[type=number]{background:#0F172A;border:1px solid #334155;border-radius:8px;color:#F8FAFC;padding:12px;font-size:15px;font-weight:600;outline:none;font-family:inherit}
.ed-field input:focus{border-color:#3B82F6}
.ed-colors{display:flex;gap:8px;flex-wrap:wrap}
.ed-color{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer}
.ed-color.active{border-color:#F8FAFC;box-shadow:0 0 0 2px #3B82F6}
.ed-exlist{display:flex;flex-direction:column;gap:6px}
.ed-exitem{display:flex;align-items:center;gap:8px;background:#0F172A;border-radius:8px;padding:10px 12px}
.ed-exitem .ex-name{flex:1;font-size:14px;color:#E2E8F0;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ed-exitem .ex-sets{font-size:12px;color:#64748B;margin-right:4px}
.ex-btn{width:30px;height:30px;border-radius:6px;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ex-btn-up{background:#1E293B;color:#94A3B8}
.ex-btn-dn{background:#1E293B;color:#94A3B8}
.ex-btn-del{background:#3B1C1C;color:#F87171}
.ex-btn-unit{background:#1E293B;font-size:11px;font-weight:700;width:auto;padding:0 8px;border-radius:6px;border:1px solid #334155}
.ex-btn-unit.is-kg{color:#3B82F6;border-color:#3B82F6}
.ex-btn-unit.is-sek{color:#F59E0B;border-color:#F59E0B}
.ed-addex{display:flex;gap:8px}
.ed-addex select{flex:1;background:#0F172A;border:1px solid #334155;border-radius:8px;color:#F8FAFC;padding:10px;font-size:13px;font-family:inherit;min-width:0}
.ed-addex select optgroup{color:#10B981;font-weight:700;font-style:normal;background:#0F172A;padding:4px 0}
.ed-addex select option{color:#F8FAFC;font-weight:400;padding:4px 8px}
.ed-addex button{padding:10px 16px;background:#10B981;border:none;border-radius:8px;color:#FFF;font-size:13px;font-weight:700;flex-shrink:0}
.ed-custom{display:flex;gap:8px;margin-top:4px}
.ed-custom input{flex:1;background:#0F172A;border:1px solid #334155;border-radius:8px;color:#F8FAFC;padding:10px;font-size:13px;font-family:inherit;min-width:0}
.ed-custom button{padding:10px 16px;background:#8B5CF6;border:none;border-radius:8px;color:#FFF;font-size:13px;font-weight:700;flex-shrink:0}
.ed-save{width:100%;padding:14px;background:#3B82F6;border:none;border-radius:10px;color:#FFF;font-size:15px;font-weight:700;margin-top:8px}
.ed-cancel{width:100%;padding:12px;background:transparent;border:1px solid #334155;border-radius:10px;color:#94A3B8;font-size:14px;font-weight:600}
.hidden{display:none}
/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);max-width:360px;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;animation:toast-in .3s ease-out;pointer-events:none}
.toast-ok{background:#065F46;color:#6EE7B7;border:1px solid #10B981}
.toast-err{background:#7F1D1D;color:#FCA5A5;border:1px solid #EF4444}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-undo{background:#1E293B;color:#E2E8F0;border:1px solid #334155;pointer-events:auto;cursor:default;display:flex;align-items:center;gap:12px}
.toast-undo .undo-btn{background:#3B82F6;color:#FFF;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
/* Offline banner */
.offline-bar{background:#78350F;color:#FDE68A;text-align:center;padding:6px 12px;font-size:12px;font-weight:600;letter-spacing:0.5px}
/* Update banner */
.update-bar{background:#1E3A5F;color:#93C5FD;text-align:center;padding:10px 12px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer}
.update-bar:hover{background:#1E40AF}
/* Auth */
.auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-card{width:100%;max-width:360px;background:#1E293B;border-radius:16px;padding:32px 24px;text-align:center}
.auth-card h1{font-size:32px;font-weight:800;letter-spacing:4px;color:#F8FAFC;margin-bottom:4px}
.auth-card h1 span{color:#10B981}

// =========== INDEXEDDB LOCAL CACHE ===========
let idb=null;
const IDB_NAME='paulog-offline';
const IDB_VERSION=1;

function openIDB(){
  return new Promise((resolve)=>{
    if(idb){resolve(idb);return;}
    const req=indexedDB.open(IDB_NAME,IDB_VERSION);
    req.onupgradeneeded=(e)=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
      if(!db.objectStoreNames.contains('queue'))db.createObjectStore('queue',{keyPath:'id',autoIncrement:true});
    };
    req.onsuccess=(e)=>{idb=e.target.result;resolve(idb);};
    req.onerror=()=>resolve(null);
  });
}

function idbPut(key,val){
  return openIDB().then(db=>{
    if(!db)return;
    return new Promise(resolve=>{
      const tx=db.transaction('kv','readwrite');
      tx.objectStore('kv').put(val,key);
      tx.oncomplete=()=>resolve();
      tx.onerror=()=>resolve();
    });
  });
}

function idbGet(key){
  return openIDB().then(db=>{
    if(!db)return null;
    return new Promise(resolve=>{
      const tx=db.transaction('kv','readonly');
      const req=tx.objectStore('kv').get(key);
      req.onsuccess=()=>resolve(req.result===undefined?null:req.result);
      req.onerror=()=>resolve(null);
    });
  });
}

// Offline queue: stores pending write operations
function enqueue(op){
  return openIDB().then(db=>{
    if(!db)return;
    return new Promise(resolve=>{
      const tx=db.transaction('queue','readwrite');
      tx.objectStore('queue').add(op);
      tx.oncomplete=()=>resolve();
      tx.onerror=()=>resolve();
    });
  });
}

function peekQueue(){
  return openIDB().then(db=>{
    if(!db)return[];
    return new Promise(resolve=>{
      const tx=db.transaction('queue','readonly');
      const req=tx.objectStore('queue').getAll();
      req.onsuccess=()=>resolve(req.result||[]);
      req.onerror=()=>resolve([]);
    });
  });
}

function removeFromQueue(id){
  return openIDB().then(db=>{
    if(!db)return;
    return new Promise(resolve=>{
      const tx=db.transaction('queue','readwrite');
      tx.objectStore('queue').delete(id);
      tx.oncomplete=()=>resolve();
      tx.onerror=()=>resolve();
    });
  });
}

// Process offline queue when back online (with lock)
let flushing=false;
async function flushQueue(){
  if(flushing||!sb||!currentUser||!isOnline)return;
  flushing=true;
  try{
    let ops=await peekQueue();
    if(ops.length===0){flushing=false;return;}
    let synced=0;
    for(let i=0;i<ops.length;i++){
      let op=ops[i];
      try{
        if(op.type==='saveSession')await sb.from('sessions').upsert({user_id:currentUser.id,day:op.day,date:op.date,exercises:op.exercises},{onConflict:'user_id,day,date'});
        else if(op.type==='deleteSession')await sb.from('sessions').delete().eq('user_id',currentUser.id).eq('day',op.day).eq('date',op.date);
        else if(op.type==='savePlan')await sb.from('plans').upsert({user_id:currentUser.id,plan_data:op.plan,updated_at:new Date().toISOString()},{onConflict:'user_id'});
        else if(op.type==='saveDraft')await sb.from('drafts').upsert({user_id:currentUser.id,day:op.draft.day,date:op.draft.date,session_data:op.draft.session,updated_at:new Date().toISOString()},{onConflict:'user_id'});
        else if(op.type==='clearDraft')await sb.from('drafts').delete().eq('user_id',currentUser.id);
        else if(op.type==='savePrefs')await sb.from('user_prefs').upsert({user_id:currentUser.id,last_backup:op.prefs['backup-date']||null,last_exercise:op.prefs['last-ex']||null},{onConflict:'user_id'});
        else if(op.type==='replaceAllSessions'){
          let rows=[];let newKeys={};
          for(let d in op.data){if(!op.data[d])continue;for(let j=0;j<op.data[d].length;j++){rows.push({user_id:currentUser.id,day:d,date:op.data[d][j].date,exercises:op.data[d][j].exercises});newKeys[d+'|'+op.data[d][j].date]=true;}}
          if(rows.length>0)await sb.from('sessions').upsert(rows,{onConflict:'user_id,day,date'});
          let exRes=await sb.from('sessions').select('day,date').eq('user_id',currentUser.id);
          if(exRes.data){let toDel=exRes.data.filter((r)=>{return !newKeys[r.day+'|'+r.date];});for(let di=0;di<toDel.length;di++){await sb.from('sessions').delete().eq('user_id',currentUser.id).eq('day',toDel[di].day).eq('date',toDel[di].date);}}
        }
        else if(op.type==='upsertSessions'){
          let urows=[];for(let ud in op.data){if(!op.data[ud])continue;for(let uj=0;uj<op.data[ud].length;uj++)urows.push({user_id:currentUser.id,day:ud,date:op.data[ud][uj].date,exercises:op.data[ud][uj].exercises});}
          if(urows.length>0)await sb.from('sessions').upsert(urows,{onConflict:'user_id,day,date'});
        }
        await removeFromQueue(op.id);
        synced++;
      }catch(e){console.error('Queue flush error:',e);showToast("Sync-Fehler: "+ops.length+" Einträge ausstehend",true);break;}
    }
    if(synced>0)showToast("Offline-Daten synchronisiert ("+synced+")");
  }finally{flushing=false;}
}

async function loadPlanFromDB(){
  let{data,error}=await sb.from('plans').select('plan_data').eq('user_id',currentUser.id).maybeSingle();
  if(error){console.error('loadPlan error:',error);showToast("Plan konnte nicht geladen werden",true);return null;}

  return data.plan_data;
}
async function savePlanToDB(plan){
  idbPut('plan',plan);
  if(!isOnline||!sb||!currentUser){await enqueue({type:'savePlan',plan:plan});return;}
  let{error}=await sb.from('plans').upsert({user_id:currentUser.id,plan_data:plan,updated_at:new Date().toISOString()},{onConflict:'user_id'});
  if(error){console.error('savePlan error:',error);showToast("Plan-Sync fehlgeschlagen",true);}
}
async function loadSessionsFromDB(){
  let{data,error}=await sb.from('sessions').select('day,date,exercises').eq('user_id',currentUser.id);
  if(error){console.error('loadSessions error:',error);showToast("Sessions konnten nicht geladen werden",true);return{};}
  if(!data)return{};
  let result={};
  for(let i=0;i<data.length;i++){
    let r=data[i];
    if(!result[r.day])result[r.day]=[];
    result[r.day].push({date:r.date,exercises:r.exercises});
  }
  return result;
}

  let{error}=await sb.from('sessions').upsert({user_id:currentUser.id,day:day,date:date,exercises:exercises},{onConflict:'user_id,day,date'});
  if(error){console.error('saveSession error:',error);throw error;}
}
async function deleteSessionFromDB(day,date){

  if(!isOnline||!sb||!currentUser){await enqueue({type:'deleteSession',day:day,date:date});return;}
  let{error}=await sb.from('sessions').delete().eq('user_id',currentUser.id).eq('day',day).eq('date',date);
  if(error){console.error('deleteSession error:',error);throw error;}
}
async function replaceAllSessionsInDB(data){
  idbPut('sessions',data);
  if(!isOnline||!sb||!currentUser){await enqueue({type:'replaceAllSessions',data:JSON.parse(JSON.stringify(data))});return;}
  // Build new rows first, then upsert all + delete stale ones (crash-safe)
  let rows=[];
  let newKeys={};
  for(let day in data){
    if(!data[day])continue;
    for(let i=0;i<data[day].length;i++){
      rows.push({user_id:currentUser.id,day:day,date:data[day][i].date,exercises:data[day][i].exercises});
      newKeys[day+'|'+data[day][i].date]=true;
    }
  }
  // Upsert new data first (data is safe even if next step fails)
  if(rows.length>0)await sb.from('sessions').upsert(rows,{onConflict:'user_id,day,date'});
  // Then remove sessions that are no longer in the dataset
  let{data:existing}=await sb.from('sessions').select('day,date').eq('user_id',currentUser.id);
  if(existing){
    let toDelete=existing.filter((r)=>{return !newKeys[r.day+'|'+r.date];});
    for(let d=0;d<toDelete.length;d++){
      await sb.from('sessions').delete().eq('user_id',currentUser.id).eq('day',toDelete[d].day).eq('date',toDelete[d].date);
    }
  }
}

  idbPut('sessions',allData);
  if(!isOnline||!sb||!currentUser){await enqueue({type:'upsertSessions',data:JSON.parse(JSON.stringify(data))});return;}
  let rows=[];
  for(let day in data){
    if(!data[day])continue;
    for(let i=0;i<data[day].length;i++){
      rows.push({user_id:currentUser.id,day:day,date:data[day][i].date,exercises:data[day][i].exercises});
    }
  }
  if(rows.length>0){let{error}=await sb.from('sessions').upsert(rows,{onConflict:'user_id,day,date'});if(error)throw error;}
}

const today=()=>new Date().toISOString().split("T")[0];
function fmtDate(ds){const d=new Date(ds+"T00:00:00");return DN[d.getDay()]+", "+p2(d.getDate())+"."+p2(d.getMonth()+1)+"."+d.getFullYear();}
const p2=(n)=>n<10?"0"+n:""+n;
function vol(sets){let s=0;for(let i=0;i<sets.length;i++)s+=(Number(sets[i].kg)||0)*(Number(sets[i].reps)||0);return s;}
function sugDay(){
  let keys=getPlanDayKeys(PLAN);
  if(keys.length===0)return null;
  // Find which day has the oldest (or no) last session
  let best=null,bestDate="9999";
  for(let i=0;i<keys.length;i++){
    let day=keys[i],arr=allData[day]||[];
    if(arr.length===0)return day;
    let last="";
    for(let j=0;j<arr.length;j++){if(arr[j].date>last)last=arr[j].date;}
    if(last<bestDate){bestDate=last;best=day;}
  }
  return best;
}

let pbCache=null;

function getPB(){

let prevCache={};
function invalidatePrevCache(){prevCache={};}
function getPrev(day,exercise){
  let cacheKey=day+"|"+exercise+"|"+state.date;
  if(prevCache[cacheKey]!==undefined)return prevCache[cacheKey];
  let dd=allData[day]||[];
  let sorted=dd.slice().sort((a,b)=>{return b.date>a.date?1:b.date<a.date?-1:0;});
  for(let i=0;i<sorted.length;i++){
    if(sorted[i].date===state.date)continue;
    let ex=sorted[i].exercises&&sorted[i].exercises[exercise];
    if(ex&&ex.some((s)=>{return s.kg||s.reps;})){prevCache[cacheKey]=ex;return ex;}
  }
  let all=[];
  for(let d in allData){
    if(d===day)continue;
    (allData[d]||[]).forEach((se)=>{
      let exd=se.exercises&&se.exercises[exercise];
      if(exd&&exd.some((s)=>{return s.kg||s.reps;}))all.push({date:se.date,ex:exd});
    });
  }
  all.sort((a,b)=>{return b.date>a.date?1:b.date<a.date?-1:0;});
  let result=all.length?all[0].ex:null;
  prevCache[cacheKey]=result;
  return result;
}

function getAllSess(){
  let ss=[];
  for(let day in allData)(allData[day]||[]).forEach((se)=>{
    let tv=0,ec=0;
    for(let ex in se.exercises||{}){tv+=vol(se.exercises[ex]);if(se.exercises[ex].some((s)=>{return s.kg||s.reps;}))ec++;}
    ss.push({day:day,date:se.date,totalVol:tv,exerciseCount:ec,exercises:se.exercises});
  });
  return ss.sort((a,b)=>{return b.date>a.date?1:b.date<a.date?-1:0;});
}

function getKW(dateStr){
  let d=new Date(dateStr+"T00:00:00");
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  let w1=new Date(d.getFullYear(),0,4);
  return Math.round(((d-w1)/864e5-3+(w1.getDay()+6)%7)/7)+1;
}

// Chart
let chartCache={};
function invalidateChartCache(){chartCache={};}
function drawChart(day,maxWeeks){
  let dd=allData[day]||[];
  let cHash=dd.length;for(let ci=0;ci<dd.length;ci++){cHash=(cHash*31+(dd[ci].date||'').length)&0x7fffffff;let ex=dd[ci].exercises;if(ex)for(let ek in ex)for(let ei=0;ei<ex[ek].length;ei++){cHash=(cHash*31+(Number(ex[ek][ei].kg)||0)*100+(Number(ex[ek][ei].reps)||0))&0x7fffffff;}}
  let cKey=day+"|"+maxWeeks+"|"+cHash;
  if(chartCache[cKey])return chartCache[cKey];
  let info=PLAN[day];
  if(!info)return'<p class="no-data">Tag nicht im aktuellen Plan</p>';
  let sessions=(allData[day]||[]).slice().sort((a,b)=>{return a.date>b.date?1:-1;});
  if(sessions.length===0)return'<p class="no-data">Noch keine Daten</p>';
  if(maxWeeks>0){
    let cutoff=new Date();cutoff.setDate(cutoff.getDate()-maxWeeks*7);
    let cutStr=cutoff.toISOString().split("T")[0];
    sessions=sessions.filter((s)=>{return s.date>=cutStr;});
    if(sessions.length===0)return'<p class="no-data">Keine Daten im gewählten Zeitraum</p>';
  }
  let kwMap={};
  sessions.forEach((s)=>{
    let kw="KW"+getKW(s.date);
    if(!kwMap[kw])kwMap[kw]={};
    info.exercises.forEach((ex)=>{
      let v=s.exercises&&s.exercises[ex]?vol(s.exercises[ex]):0;
      if(v>0){if(!kwMap[kw][ex]||v>kwMap[kw][ex])kwMap[kw][ex]=v;}
    });
  });
  let kwKeys=Object.keys(kwMap);
  let data=kwKeys.map((kw)=>{let pt={name:kw};info.exercises.forEach((ex)=>{pt[ex]=kwMap[kw][ex]||0;});return pt;});
  let W=340,H=200,pl=45,pt2=20,pr=10,pb=30,cw=W-pl-pr,ch=H-pt2-pb;
  let allV=[];data.forEach((p)=>{info.exercises.forEach((ex)=>{if(p[ex])allV.push(p[ex]);});});
  let maxV=Math.max.apply(null,allV)||1;
  function x(i){return pl+(data.length===1?cw/2:(i/(data.length-1))*cw);}
  function y(v){return pt2+ch-(v/maxV)*ch;}

  let svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="max-width:'+W+'px">';
  for(let g=0;g<=4;g++){let gv2=g/4*maxV,gy=y(gv2);svg+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="#334155" stroke-width="0.5"/>';svg+='<text x="'+(pl-5)+'" y="'+(gy+3)+'" fill="#64748B" font-size="9" text-anchor="end">'+Math.round(gv2)+'</text>';}
  data.forEach((p,i)=>{svg+='<text x="'+x(i)+'" y="'+(H-5)+'" fill="#64748B" font-size="9" text-anchor="middle">'+p.name+'</text>';});
  info.exercises.forEach((ex,ei)=>{
    let pts=[];data.forEach((p,i)=>{if(p[ex])pts.push({x:x(i),y:y(p[ex])});});
    if(pts.length<1)return;
    let d=pts.map((p,i)=>{return(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
    svg+='<path d="'+d+'" fill="none" stroke="'+CC[ei%CC.length]+'" stroke-width="2" stroke-linejoin="round"/>';
    pts.forEach((p)=>{svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="'+CC[ei%CC.length]+'"/>';});
  });
  svg+='</svg>';
  svg+='<div class="c-legend">';
  info.exercises.forEach((ex,i)=>{svg+='<span><span class="dot" style="background:'+CC[i%CC.length]+'"></span>'+esc(ex)+'</span>';});
  svg+='</div>';
  chartCache[cKey]=svg;
  return svg;
}

let lastView=null;
function render(){
  let el=document.getElementById("app");
  let v=state.view;
  let offlineBar=!isOnline?'<div class="offline-bar" role="alert">Offline – Daten werden lokal gespeichert</div>':'';

  // Save scroll and focus state before re-render
  let scrollY=window.scrollY;
  let activeEl=document.activeElement;
  let focusId=activeEl?activeEl.id:'';
  let focusAction=activeEl?activeEl.getAttribute('data-action'):'';
  let focusEx=activeEl?activeEl.getAttribute('data-ex'):'';
  let focusSi=activeEl?activeEl.getAttribute('data-si'):'';
  let focusField=activeEl?activeEl.getAttribute('data-field'):'';
  let focusSelStart=activeEl&&activeEl.selectionStart!==undefined?activeEl.selectionStart:null;

  if(v==="loading") el.innerHTML=renderLoading();
  else if(v==="auth") el.innerHTML=offlineBar+renderAuth();
  else if(v==="migrate") el.innerHTML=renderMigrate();
  else if(v==="home") el.innerHTML=offlineBar+renderHome();
  else if(v==="track") el.innerHTML=offlineBar+renderTrack();
  else if(v==="history") el.innerHTML=offlineBar+renderHistory();
  else if(v==="dashboard") el.innerHTML=offlineBar+renderDash();
  else if(v==="backup") el.innerHTML=offlineBar+renderBackup();
  else if(v==="settings") el.innerHTML=offlineBar+renderSettings();
  else if(v==="admin"&&isAdmin()) el.innerHTML=offlineBar+renderAdmin();
  else if(v==="editday") el.innerHTML=offlineBar+renderEditDay();

  bindEvents();

  // Restore focus after re-render
  let viewChanged=lastView!==v;
  lastView=v;
  let restored=false;
  if(!viewChanged&&(focusId||focusAction)){
    let newFocus=null;
    if(focusId)newFocus=document.getElementById(focusId);
    if(!newFocus&&focusAction==='set-val'&&focusEx&&focusSi&&focusField){
      newFocus=el.querySelector('[data-action="set-val"][data-ex="'+focusEx+'"][data-si="'+focusSi+'"][data-field="'+focusField+'"]');
    }
    if(newFocus){newFocus.focus({preventScroll:true});if(focusSelStart!==null){try{newFocus.setSelectionRange(focusSelStart,focusSelStart);}catch(e){}}restored=true;}
  }
  // Restore scroll position within same view
  if(!viewChanged)window.scrollTo(0,scrollY);
  // Focus management on view change: focus first heading
  if(viewChanged&&!restored){
    let focusTarget=el.querySelector('h1,h2,[autofocus]');
    if(focusTarget){focusTarget.setAttribute('tabindex','-1');focusTarget.focus({preventScroll:true});}
  }
}

// =========== EVENT HANDLING ===========
function bindEvents(){
  let app=document.getElementById("app");
  // Auth form submit
  let authForm=document.getElementById("auth-form");
  if(authForm){
    authForm.onsubmit=(e)=>{e.preventDefault();handleAuthSubmit();};
  }
  // Admin file inputs
  let adminFile=document.getElementById("admin-plan-file");
  if(adminFile){
    adminFile.onchange=(e)=>{
      let f=e.target.files[0];if(!f)return;
      let reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          let raw=JSON.parse(ev.target.result);
          if(raw.app==="paulog"&&raw.plan){raw=raw.plan;}
          state.adminPlanJSON=JSON.stringify(raw);
        }catch(ex){state.adminPlanJSON=ev.target.result;}
        render();
      };
      reader.readAsText(f);
    };
  }
  let sessFile=document.getElementById("admin-sessions-file");
  if(sessFile){
    sessFile.onchange=(e)=>{
      let f=e.target.files[0];if(!f)return;
      let reader=new FileReader();
      reader.onload=(ev)=>{
        try{
          let raw=JSON.parse(ev.target.result);
          // Unwrap paulog export format: {app,type,data:{...}}
          if(raw.app==="paulog"&&raw.data){raw=raw.data;}
          let sessCount=0;
          for(let k in raw){if(raw[k])sessCount+=raw[k].length;}
          if(!confirm('Fortschritt importieren: '+sessCount+' Sessions in '+Object.keys(raw).length+' Tagen?\n\nBestehende Sessions mit gleichem Datum werden überschrieben.')){return;}
          adminImportUserSessions(state.adminSelectedUser,raw).then((ok)=>{
            if(ok){alert('Fortschritt erfolgreich importiert!');loadAdminUsers();}
          });
        }catch(ex){alert('Ungültige JSON-Datei');}
      };
      reader.readAsText(f);
    };
  }
  app.onclick=(e)=>{
    let t=e.target.closest("[data-action]");
    if(!t)return;
    let a=t.getAttribute("data-action");

    if(a==="auth-switch"){
      state.authView=state.authView==="login"?"register":"login";
      state.authError=null;state.authMsg=null;render();return;
    }
    else if(a==="logout"){handleLogout();return;}
    else if(a==="migrate-yes"){performMigration();return;}
    else if(a==="migrate-no"){skipMigration();return;}

    if(a==="go"){
      // Save draft if leaving track view with unsaved data
      if(state.view==="track"&&state.day&&!state.editing){
        let hasData=false;
        for(let sk in state.session){(state.session[sk]||[]).forEach((s)=>{if(s.kg||s.reps)hasData=true;});}
        if(hasData)saveDraft();
      }
      state.view=t.getAttribute("data-view");state.editing=null;state.delConfirm=null;state.historyLimit=20;render();
    }
    else if(a==="start"){initSession(t.getAttribute("data-day"),null,null);state.view="track";render();}
    else if(a==="toggle-ex"){let ex=t.getAttribute("data-ex");state.expanded=state.expanded===ex?null:ex;if(state.expanded&&state.day)saveLastEx(state.day,state.expanded);render();}
    else if(a==="open-wp"){openWheelPicker(t.getAttribute("data-ex"),parseInt(t.getAttribute("data-si")),t.getAttribute("data-field"));}
    else if(a==="save"){saveSession();render();}
    else if(a==="edit"){
      let day=t.getAttribute("data-day"),date=t.getAttribute("data-date");
      let sess=(allData[day]||[]).find((s)=>{return s.date===date;});
      if(sess){state.editing={day:day,date:date};initSession(day,date,sess.exercises);state.view="track";render();}
    }
    else if(a==="del-ask"){state.delConfirm={day:t.getAttribute("data-day"),date:t.getAttribute("data-date")};render();}
    else if(a==="del-confirm"){
      let dy=t.getAttribute("data-day"),dt=t.getAttribute("data-date");
      // Soft-delete: remove from view but keep backup for undo
      let deletedSession=null;
      let arr=allData[dy]||[];
      for(let si=0;si<arr.length;si++){if(arr[si].date===dt){deletedSession=JSON.parse(JSON.stringify(arr[si]));break;}}
      allData[dy]=arr.filter((s)=>{return s.date!==dt;});invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
      if(allData[dy].length===0)delete allData[dy];
      state.delConfirm=null;render();
      // Show undo toast
      ((delDay,delDate,delSess)=>{
        let undone=false;
        let undoTimer=setTimeout(()=>{
          if(!undone)deleteSessionFromDB(delDay,delDate).catch(()=>{showToast("Löschen fehlgeschlagen",true);});
        },5000);
        let el=document.createElement("div");
        el.className="toast toast-undo";
        el.setAttribute("role","status");
        el.innerHTML='<span>Session gelöscht</span><button class="undo-btn">Rückgängig</button>';
        el.querySelector(".undo-btn").onclick=()=>{
          undone=true;clearTimeout(undoTimer);el.remove();
          if(!allData[delDay])allData[delDay]=[];
          allData[delDay].push(delSess);
          allData[delDay].sort((a,b)=>{return a.date>b.date?1:-1;});
          invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
          idbPut('sessions',allData);
          render();showToast("Session wiederhergestellt");
        };
        document.body.appendChild(el);
        setTimeout(()=>{if(el.parentNode)el.remove();},5500);
      })(dy,dt,deletedSession);
    }
    else if(a==="del-cancel"){state.delConfirm=null;render();}
    else if(a==="export-data"){exportData();state.showRem=false;render();}
    else if(a==="export-plan"){exportPlan();render();}
    else if(a==="set-weeks"){state.dashWeeks=parseInt(t.getAttribute("data-weeks"))||0;render();}
    else if(a==="load-more"){state.historyLimit+=20;render();}
    else if(a==="backup-now"){exportData();state.showRem=false;render();}
    else if(a==="dismiss-rem"){state.showRem=false;render();}
    else if(a==="clear-cache"){
      if(!confirm("App-Cache leeren und Seite neu laden?"))return;
      Promise.all([
        caches.keys().then((keys)=>{return Promise.all(keys.map((k)=>{return caches.delete(k);}));}),
        navigator.serviceWorker?navigator.serviceWorker.getRegistrations().then((regs)=>{return Promise.all(regs.map((r)=>{return r.unregister();}));}):Promise.resolve()
      ]).then(()=>{window.location.reload(true);}).catch(()=>{window.location.reload(true);});
    }
    else if(a==="imp-merge"){doImport("merge");}
    else if(a==="imp-replace"){doImport("replace");}

      adminGetUserSessions(state.adminSelectedUser).then((s)=>{
        if(!s||Object.keys(s).length===0){alert('Keine Sessions vorhanden');return;}
        let name2=su2?su2.email.split('@')[0]:'user';
        downloadJSON('paulog-daten-'+name2+'-'+today()+'.json',{app:"paulog",type:"data",version:2,exported:new Date().toISOString(),data:s});

    // ===== SETTINGS ACTIONS =====
    else if(a==="edit-day"){
      let dn=t.getAttribute("data-day");
      state.editDay=dn;
      let inf=PLAN[dn];
      state.editDayData={name:dn,muscles:inf.muscles,color:inf.color,sets:inf.sets||4,exercises:inf.exercises.slice(),units:JSON.parse(JSON.stringify(inf.units||{}))};
      state.customExInput="";

    else if(a==="add-day"){

      state.editDayData={name:"",muscles:"",color:PALETTE[getPlanDayKeys(PLAN).length%PALETTE.length],sets:4,exercises:[],units:{}};
      state.customExInput="";
      state.view="editday";render();

        let newPlan={};
        for(let k in PLAN){if(k!==ddn)newPlan[k]=PLAN[k];}
        PLAN=newPlan;savePlan(PLAN);render();
      }
    }
    else if(a==="day-up"){movePlanDay(t.getAttribute("data-day"),-1);}
    else if(a==="day-down"){movePlanDay(t.getAttribute("data-day"),1);}
    else if(a==="reset-plan"){
      if(confirm('Plan auf Standard zurücksetzen?\n\nBestehende Session-Daten bleiben erhalten.')){
        PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));savePlan(PLAN);render();
      }
    }

    // ===== EDIT DAY ACTIONS =====
    else if(a==="set-color"){
      if(state.editDayData){state.editDayData.color=t.getAttribute("data-color");render();}
    }
    else if(a==="ex-up"){
      let idx=parseInt(t.getAttribute("data-idx"));
      if(state.editDayData&&idx>0){
        let arr=state.editDayData.exercises;
        let tmp=arr[idx];arr[idx]=arr[idx-1];arr[idx-1]=tmp;render();
      }
    }
    else if(a==="ex-down"){

      if(state.editDayData&&idx2<state.editDayData.exercises.length-1){

        let tmp2=arr2[idx2];arr2[idx2]=arr2[idx2+1];arr2[idx2+1]=tmp2;render();

    else if(a==="cancel-edit-day"){
      state.editDay=null;state.editDayData=null;state.customExInput="";state.view="settings";render();
    }
  };

  // Input changes (delegated)
  app.oninput=(e)=>{
    let t=e.target;
    if(t.getAttribute("data-action")==="set-val"){
      let ex=t.getAttribute("data-ex"),si=parseInt(t.getAttribute("data-si")),field=t.getAttribute("data-field");
      if(state.session[ex]&&state.session[ex][si])state.session[ex][si][field]=t.value;
      if(state.day)saveLastEx(state.day,ex);
      saveDraft();
    }
    else if(t.getAttribute("data-action")==="set-date"){
      state.date=t.value;
      let arr=allData[state.day]||[];
      let existing=arr.find((s)=>{return s.date===state.date;});
      if(existing&&existing.exercises){state.session=JSON.parse(JSON.stringify(existing.exercises));}
      else{
        let se={};let numSets=getDaySets(PLAN,state.day);
        if(PLAN[state.day]){PLAN[state.day].exercises.forEach((e)=>{se[e]=[];for(let i=0;i<numSets;i++)se[e].push({kg:"",reps:""});});}
        state.session=se;
      }
      render();
    }
    // Track custom exercise input without re-render
    if(t.id==="ed-custom-ex"){state.customExInput=t.value;}
  };

  // File input - Data import
  let fiData=app.querySelector("[data-action='import-data-file']");
  if(fiData)fiData.onchange=(e)=>{
    let f=e.target.files&&e.target.files[0];if(!f)return;
    let r=new FileReader();
    r.onload=(ev)=>{
      try{
        let p=JSON.parse(ev.target.result);
        let d=p.data||p;
        if(typeof d!=="object"||Array.isArray(d))throw 0;
        if(p.type==="plan"){state.impStatus="error";render();setTimeout(()=>{state.impStatus=null;render();},3000);return;}
        // Validate structure: each key must be an array of {date, exercises}
        for(let dk in d){
          if(!Array.isArray(d[dk]))throw 0;
          for(let di=0;di<d[dk].length;di++){
            let entry=d[dk][di];
            if(!entry||typeof entry.date!=="string"||!entry.date.match(/^\d{4}-\d{2}-\d{2}$/))throw 0;
            if(entry.exercises&&typeof entry.exercises!=="object")throw 0;
          }
        }
        state.impData=d;state.impStatus="confirm-data";render();
      }
      catch(err){state.impStatus="error";render();setTimeout(()=>{state.impStatus=null;render();},3000);}
    };
    r.readAsText(f);
  };

  // File input - Plan import
  let fiPlan=app.querySelector("[data-action='import-plan-file']");
  if(fiPlan)fiPlan.onchange=(e)=>{
    let f=e.target.files&&e.target.files[0];if(!f)return;
    let r=new FileReader();
    r.onload=(ev)=>{
      try{
        let p=JSON.parse(ev.target.result);
        let plan=p.plan||null;
        if(!plan||typeof plan!=="object"||Object.keys(plan).length===0)throw 0;
        state.impPlan=plan;state.impStatus="confirm-plan";render();
      }
      catch(err){state.impStatus="error";render();setTimeout(()=>{state.impStatus=null;render();},3000);}
    };
    r.readAsText(f);
  };
}


function movePlanDay(day,dir){
  let keys=getPlanDayKeys(PLAN);
  let idx=keys.indexOf(day);
  if(idx<0)return;
  let ni=idx+dir;
  if(ni<0||ni>=keys.length)return;
  let tmp=keys[idx];keys[idx]=keys[ni];keys[ni]=tmp;
  let newPlan={};
  for(let i=0;i<keys.length;i++)newPlan[keys[i]]=PLAN[keys[i]];
  PLAN=newPlan;savePlan(PLAN);render();
}

let savingDay=false;
function saveDayEdits(){
  if(savingDay)return;
  let d=state.editDayData;
  // Read current values from inputs
  let nameInput=document.getElementById("ed-name");
  let muscInput=document.getElementById("ed-muscles");
  let setsInput=document.getElementById("ed-sets");
  if(nameInput)d.name=nameInput.value.trim();
  if(muscInput)d.muscles=muscInput.value.trim();
  if(setsInput)d.sets=Math.max(1,Math.min(10,parseInt(setsInput.value)||4));

  if(!d.name){alert("Bitte einen Namen eingeben.");return;}
  if(d.exercises.length===0){alert("Mindestens eine Übung hinzufügen.");return;}

  let oldName=state.editDay;
  // If renaming, check for conflicts
  if(d.name!==oldName&&PLAN[d.name]){alert('Ein Tag mit dem Namen "'+d.name+'" existiert bereits.');return;}
  savingDay=true;

  // Build new plan preserving order
  let newPlan={};
  if(oldName){
    // Editing existing day
    for(let k in PLAN){
      if(k===oldName){
        newPlan[d.name]={muscles:d.muscles,color:d.color,sets:d.sets,units:d.units||{},exercises:d.exercises.slice()};
      }else{
        newPlan[k]=PLAN[k];
      }
    }
  }else{
    // Adding new day
    for(let k2 in PLAN)newPlan[k2]=PLAN[k2];
    newPlan[d.name]={muscles:d.muscles,color:d.color,sets:d.sets,units:d.units||{},exercises:d.exercises.slice()};
  }

  PLAN=newPlan;savePlan(PLAN);
  state.editDay=null;state.editDayData=null;state.customExInput="";
  savingDay=false;
  state.view="settings";render();
}

function initSession(day,date,exData){
  state.day=day;state.date=date||today();
  let numSets=getDaySets(PLAN,day);
  if(exData){state.session=JSON.parse(JSON.stringify(exData));}
  else{
    // Check for unsaved draft first
    let draft=loadDraft(day);
    if(draft&&!date){
      state.date=draft.date;
      state.session=draft.session;
    } else {
      let arr=allData[day]||[];
      let existing=arr.find((s)=>{return s.date===state.date;});
      if(existing&&existing.exercises){state.session=JSON.parse(JSON.stringify(existing.exercises));}
      else{
        let se={};
        if(PLAN[day]){
          PLAN[day].exercises.forEach((e)=>{se[e]=[];for(let i=0;i<numSets;i++)se[e].push({kg:"",reps:""});});
        }
        state.session=se;
      }
    }
  }
  // Ensure all exercises from current plan have entries
  if(PLAN[day]){
    PLAN[day].exercises.forEach((ex)=>{
      if(!state.session[ex]){
        state.session[ex]=[];
        for(let i=0;i<numSets;i++)state.session[ex].push({kg:"",reps:""});
      }
      // Adjust set count if plan changed
      while(state.session[ex].length<numSets)state.session[ex].push({kg:"",reps:""});
    });
  }
  // Expand last edited exercise, fallback to first
  let lastEx=getLastEx(day);
  if(lastEx&&PLAN[day]&&PLAN[day].exercises.indexOf(lastEx)>=0){
    state.expanded=lastEx;
  } else {
    state.expanded=PLAN[day]?PLAN[day].exercises[0]:null;
  }
}

function sanitizeSession(session){
  let clean={};
  for(let ex in session){
    clean[ex]=[];
    for(let i=0;i<session[ex].length;i++){
      let kg=parseFloat(session[ex][i].kg)||0;
      let reps=parseFloat(session[ex][i].reps)||0;
      clean[ex].push({kg:kg<0?"":String(kg),reps:reps<0?"":String(Math.round(reps))});
    }
  }
  return clean;
}

let savingSession=false;
function saveSession(){
  if(savingSession)return;
  savingSession=true;
  invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
  state.session=sanitizeSession(state.session);
  if(!allData[state.day])allData[state.day]=[];
  let idx=-1;
  for(let i=0;i<allData[state.day].length;i++){if(allData[state.day][i].date===state.date){idx=i;break;}}
  let entry={date:state.date,exercises:state.session};
  if(idx>=0)allData[state.day][idx]=entry;else allData[state.day].push(entry);
  saveSessionToDB(state.day,state.date,state.session).then(()=>{showToast("Session gespeichert");}).catch(()=>{showToast("Session konnte nicht gespeichert werden",true);});
  clearDraft();state.editing=null;savingSession=false;state.view="history";
}

function doImport(mode){
  invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
  if(mode==="replace"){allData=state.impData;}
  else{
    for(let day in state.impData){
      if(!allData[day])allData[day]=[];
      state.impData[day].forEach((s)=>{
        let idx=-1;for(let i=0;i<allData[day].length;i++){if(allData[day][i].date===s.date){idx=i;break;}}
        if(idx>=0)allData[day][idx]=s;else allData[day].push(s);
      });
    }
  }
  if(mode==="replace"){replaceAllSessionsInDB(allData).catch(()=>{showToast("Import fehlgeschlagen",true);});}
  else{upsertSessionsToDB(allData).catch(()=>{showToast("Import fehlgeschlagen",true);});}
  state.impData=null;state.impPlan=null;state.impStatus="success";state.session={};state.date=today();state.editing=null;render();
  setTimeout(()=>{state.impStatus=null;render();},3000);
}

// =========== WHEEL PICKER ===========
let wpActive=null; // {ex, si, field, el}

function buildWpValues(field,unit){
  let vals=[];
  if(field==="kg"){
    if(unit==="sek"){for(let s=0;s<=300;s+=5)vals.push(s);}
    else{for(let k=0;k<=200;k+=2.5)vals.push(k);}
  } else {
    for(let r=0;r<=100;r++)vals.push(r);
  }
  return vals;
}

function openWheelPicker(ex,si,field){
  let unit=getExUnit(state.day,ex);
  let vals=buildWpValues(field,unit);
  let current=parseFloat((state.session[ex]&&state.session[ex][si]&&state.session[ex][si][field])||0)||0;
  if(current===0){let prevS=getPrev(state.day,ex);if(prevS&&prevS[si]&&prevS[si][field])current=parseFloat(prevS[si][field])||0;}
  // Find closest index
  let bestIdx=0,bestDist=Infinity;
  for(let i=0;i<vals.length;i++){let d=Math.abs(vals[i]-current);if(d<bestDist){bestDist=d;bestIdx=i;}}

  let unitLabel=field==="kg"?(unit==="sek"?"Sekunden":"kg"):"Wiederholungen";
  let overlay=document.createElement("div");
  overlay.className="wp-overlay";
  overlay.innerHTML='<div class="wp-box"><div class="wp-top"><span class="wp-title">'+esc(ex)+' – Satz '+(si+1)+' – '+unitLabel+'</span><button class="wp-done">Fertig</button></div><div class="wp-cols"><div class="wp-col"><div class="wp-sel"></div><div class="wp-col-inner"></div></div></div></div>';

  document.body.appendChild(overlay);

  let col=overlay.querySelector(".wp-col");
  let inner=overlay.querySelector(".wp-col-inner");
  let ITEM_H=42, VISIBLE=5, CENTER=Math.floor(VISIBLE/2);

  // Render items
  let html="";
  for(let v=0;v<vals.length;v++){
    let label=vals[v]%1===0?vals[v].toString():vals[v].toFixed(1);
    html+='<div class="wp-item" data-idx="'+v+'">'+label+'</div>';
  }
  inner.innerHTML=html;

  let selectedIdx=bestIdx;
  let yOffset=0;

  function setPos(idx,animate){
    selectedIdx=Math.max(0,Math.min(vals.length-1,Math.round(idx)));
    yOffset=-selectedIdx*ITEM_H+CENTER*ITEM_H;
    if(animate)inner.classList.add("animating");
    else inner.classList.remove("animating");
    inner.style.transform="translateY("+yOffset+"px)";
    // Update active class
    let items=inner.children;
    for(let i=0;i<items.length;i++){
      items[i].classList.toggle("active",i===selectedIdx);
    }
  }

  function endAnim(){inner.classList.remove("animating");}
  inner.addEventListener("transitionend",endAnim);

  setPos(bestIdx,false);

  // Touch handling
  let startY=0,startOff=0,lastY=0,lastT=0,velocity=0,isDragging=false;

  function onStart(e){
    let ev=e.touches?e.touches[0]:e;
    startY=ev.clientY;startOff=yOffset;lastY=startY;lastT=Date.now();velocity=0;isDragging=true;
    inner.classList.remove("animating");
    e.preventDefault();
  }
  function onMove(e){
    if(!isDragging)return;
    let ev=e.touches?e.touches[0]:e;
    let dy=ev.clientY-startY;
    let now=Date.now();
    let dt=now-lastT;
    if(dt>0)velocity=(ev.clientY-lastY)/dt;
    lastY=ev.clientY;lastT=now;
    yOffset=startOff+dy;
    inner.style.transform="translateY("+yOffset+"px)";
    e.preventDefault();
  }
  function onEnd(e){
    if(!isDragging)return;
    isDragging=false;
    // Apply momentum
    let momentum=velocity*120;
    let targetY=yOffset+momentum;
    let targetIdx=Math.round(-(targetY-CENTER*ITEM_H)/ITEM_H);
    setPos(targetIdx,true);
    e.preventDefault();
  }

  col.addEventListener("touchstart",onStart,{passive:false});
  col.addEventListener("touchmove",onMove,{passive:false});
  col.addEventListener("touchend",onEnd,{passive:false});
  col.addEventListener("mousedown",onStart);

  function onDocMove(e){onMove(e);}
  function onDocUp(e){onEnd(e);removeDocListeners();}
  function addDocListeners(){document.addEventListener("mousemove",onDocMove);document.addEventListener("mouseup",onDocUp);}
  function removeDocListeners(){document.removeEventListener("mousemove",onDocMove);document.removeEventListener("mouseup",onDocUp);}
  col.addEventListener("mousedown",()=>addDocListeners());

  function closeOverlay(){
    removeDocListeners();
    if(overlay.parentNode)overlay.parentNode.removeChild(overlay);
  }

  // Click on item to select
  inner.addEventListener("click",(e)=>{
    const item=e.target.closest(".wp-item");
    if(item){setPos(parseInt(item.getAttribute("data-idx")),true);}
  });

  // Done button
  overlay.querySelector(".wp-done").onclick=()=>{
    let val=vals[selectedIdx];
    if(state.session[ex]&&state.session[ex][si]){
      state.session[ex][si][field]=val===0?"":String(val%1===0?val:val.toFixed(1));
    }
    if(state.day)saveLastEx(state.day,ex);
    saveDraft();
    closeOverlay();
    render();
  };

  // Tap backdrop to close without saving
  overlay.addEventListener("click",(e)=>{
    if(e.target===overlay){closeOverlay();}
  });
}

// =========== AUTH FUNCTIONS ===========
async function handleAuthSubmit(){
  let email=document.getElementById("auth-email").value.trim();
  let pw=document.getElementById("auth-pw").value;
  if(!email||!pw)return;
  state.authLoading=true;state.authError=null;state.authMsg=null;render();
  try{
    let res;
    if(state.authView==="login"){
      res=await sb.auth.signInWithPassword({email:email,password:pw});
    }else{
      res=await sb.auth.signUp({email:email,password:pw});
    }
    if(res.error){state.authError=res.error.message;state.authLoading=false;render();return;}
    if(state.authView==="register"&&res.data&&res.data.user&&!res.data.session){
      state.authMsg="Registrierung erfolgreich! Du kannst dich jetzt anmelden.";
      state.authView="login";state.authLoading=false;render();return;
    }
    currentUser=res.data.user;
    state.authLoading=false;
    await loadAppData();
  }catch(e){
    state.authError="Fehler: "+e.message;state.authLoading=false;render();
  }
}
async function handleLogout(){
  await sb.auth.signOut();
  currentUser=null;allData={};PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));
  userPrefs={};cachedDraft=null;
  state.view="auth";state.authError=null;state.authMsg=null;render();
}

// =========== APP DATA LOADING ===========
async function loadAppData(){
  state.view="loading";render();
  try{
    // Load from local cache first (instant)
    let local=await loadLocal();
    let hasLocal=local.plan||local.sessions;
    if(hasLocal){
      if(local.plan&&typeof local.plan==="object"&&Object.keys(local.plan).length>0)PLAN=local.plan;
      else PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));
      allData=local.sessions||{};
      cachedDraft=local.draft||null;
      userPrefs=local.prefs||{};
      invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
    }
    // Try to sync from Supabase (may fail offline)
    if(isOnline&&sb&&currentUser){
      try{
        let results=await Promise.all([loadPlanFromDB(),loadSessionsFromDB(),loadDraftFromDB(),loadPrefsFromDB()]);
        let dbPlan=results[0];
        if(dbPlan&&typeof dbPlan==="object"&&Object.keys(dbPlan).length>0)PLAN=dbPlan;
        else if(!hasLocal)PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));
        allData=results[1]||{};invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
        cachedDraft=results[2];
        userPrefs=results[3]||{};
        await saveLocal();
      }catch(e){
        console.error("DB sync error:",e);
        if(!hasLocal){PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));allData={};}
      }
    } else if(!hasLocal){
      PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));allData={};
    }
    // Check for localStorage data to migrate
    let migrated=false;
    try{migrated=localStorage.getItem("paulog-migrated")==="true";}catch(e){}
    if(!migrated){
      let localData=null;
      try{let r=localStorage.getItem("paulog-data");if(r)localData=JSON.parse(r);}catch(e){}
      if(localData&&typeof localData==="object"&&Object.keys(localData).length>0){
        let migrateKeys={"Push (Mo)":"Push","Pull (Mi)":"Pull","Legs (Fr)":"Legs"};
        for(let old in migrateKeys){if(localData[old]){localData[migrateKeys[old]]=(localData[migrateKeys[old]]||[]).concat(localData[old]);delete localData[old];}}
        state.migrationData=localData;
        try{let lp=localStorage.getItem("paulog-plan");if(lp){state.migrationPlan=JSON.parse(lp);}}catch(e){}
        state.view="migrate";render();return;
      }
      try{localStorage.setItem("paulog-migrated","true");}catch(e){}
    }
    state.showRem=daysBack()>=14&&totalSess()>0;
    state.view="home";render();
  }catch(e){
    console.error("loadAppData error:",e);
    state.view="home";render();
  }
}

async function performMigration(){
  state.view="loading";render();
  try{
    let localData=state.migrationData;
    // Merge local sessions into DB data
    for(let day in localData){
      if(!allData[day])allData[day]=[];
      for(let i=0;i<localData[day].length;i++){
        let s=localData[day][i];
        let exists=false;
        for(let j=0;j<allData[day].length;j++){if(allData[day][j].date===s.date){allData[day][j]=s;exists=true;break;}}
        if(!exists)allData[day].push(s);
      }
    }
    await replaceAllSessionsInDB(allData);
    // Upload plan if custom
    if(state.migrationPlan&&typeof state.migrationPlan==="object"&&Object.keys(state.migrationPlan).length>0){
      PLAN=state.migrationPlan;
      await savePlanToDB(PLAN);
    }
    // Migrate prefs
    try{
      let lb=localStorage.getItem("paulog-bk");if(lb)userPrefs['backup-date']=lb;
      let le=localStorage.getItem("paulog-last-ex");if(le)userPrefs['last-ex']=JSON.parse(le);
      if(lb||le)await savePrefsToDB();
    }catch(e){}
    // Clean up localStorage
    try{
      localStorage.removeItem("paulog-data");
      localStorage.removeItem("paulog-plan");
      localStorage.removeItem("paulog-bk");
      localStorage.removeItem("paulog-draft");
      localStorage.removeItem("paulog-last-ex");
      localStorage.setItem("paulog-migrated","true");
    }catch(e){}
    state.migrationData=null;state.migrationPlan=null;
    state.showRem=daysBack()>=14&&totalSess()>0;
    state.view="home";render();
  }catch(e){
    console.error("Migration error:",e);
    state.view="home";render();
  }
}

function skipMigration(){
  try{
    localStorage.removeItem("paulog-data");
    localStorage.removeItem("paulog-plan");
    localStorage.removeItem("paulog-bk");
    localStorage.removeItem("paulog-draft");
    localStorage.removeItem("paulog-last-ex");
    localStorage.setItem("paulog-migrated","true");
  }catch(e){}
  state.migrationData=null;state.migrationPlan=null;
  state.showRem=daysBack()>=14&&totalSess()>0;
  state.view="home";render();
}

// =========== INIT ===========
render(); // shows loading screen immediately

function startApp(){
  if(sb)return;
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  (async ()=>{
    try{
      let{data}=await sb.auth.getSession();
      if(data&&data.session&&data.session.user){
        currentUser=data.session.user;
        await loadAppData();
      }else{
        // No session but maybe we have local data (offline revisit)
        await startOffline();
      }
    }catch(e){
      console.error("Init error:",e);
      await startOffline();
    }
    sb.auth.onAuthStateChange((event,session)=>{
      if(event==="SIGNED_OUT"){
        currentUser=null;allData={};PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));
        userPrefs={};cachedDraft=null;
        state.view="auth";render();
      }else if(event==="TOKEN_REFRESHED"&&session){
        currentUser=session.user;
      }
    });
  })();
}

async function startOffline(){
  let local=await loadLocal();
  if(local.plan||local.sessions){
    if(local.plan&&typeof local.plan==="object"&&Object.keys(local.plan).length>0)PLAN=local.plan;
    else PLAN=JSON.parse(JSON.stringify(DEFAULT_PLAN));
    allData=local.sessions||{};
    cachedDraft=local.draft||null;
    userPrefs=local.prefs||{};
    invalidatePrevCache();invalidateChartCache();invalidatePBCache();invalidateTotalSessCache();
    state.view="home";render();
  }else{
    state.view="auth";render();
  }
}

// Supabase CDN loads async – start when ready
if(typeof supabase!=='undefined'){
  startApp();
}else{
  let sbEl=document.getElementById('sb-script');
  if(sbEl){
    sbEl.addEventListener('load',startApp);
    sbEl.addEventListener('error',()=>{
      // SDK failed to load (offline, first visit had SDK cached) — try local data
      (async ()=>{await startOffline();})();
    });
  }
}

})();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then((regs)=>{
    let foreign=regs.filter((r)=>{return r.active&&r.active.scriptURL.indexOf('paulog-sw.js')===-1;});
    Promise.all(foreign.map((r)=>{return r.unregister();})).then(()=>{
      if(window.caches){caches.keys().then((keys)=>{keys.forEach((k)=>{if(k.indexOf('paulog')===- 1)caches.delete(k);});});}
      navigator.serviceWorker.register('paulog-sw.js').then((reg)=>{
        // Check for updates periodically
        setInterval(()=>{reg.update();},60*60*1000);
        // Detect waiting worker (new version available)
        function showUpdateBanner(){
          if(document.querySelector('.update-bar'))return;
          let bar=document.createElement('div');
          bar.className='update-bar';
          bar.setAttribute('role','alert');
          bar.innerHTML='Neue Version verfügbar! <strong>Jetzt aktualisieren</strong>';
          bar.onclick=()=>{
            if(reg.waiting)reg.waiting.postMessage({type:'SKIP_WAITING'});
            window.location.reload();
          };
          document.body.insertBefore(bar,document.body.firstChild);
        }
        if(reg.waiting)showUpdateBanner();
        reg.addEventListener('updatefound',()=>{
          let newWorker=reg.installing;
          if(newWorker){
            newWorker.addEventListener('statechange',()=>{
              if(newWorker.state==='installed'&&navigator.serviceWorker.controller)showUpdateBanner();
            });
          }
        });
      });
    });
  });
  // Reload when new SW takes over
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(!refreshing){refreshing=true;window.location.reload();}
  });
}
</script>
